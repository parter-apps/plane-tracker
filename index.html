<!DOCTYPE html>
<html lang="ca" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Avions">
  <meta name="theme-color" content="#080e1f" id="meta-theme">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icon-180.svg">
  <title>Avions a la vista!</title>
  <style>
    /* ŌöĆŌöĆ Theme variables ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    :root, [data-theme="dark"] {
      --bg:               #080e1f;
      --bg-card:          #0f1628;
      --bg-inset:         #080e1f;
      --bg-header:        #0d1630;
      --border:           #1a2340;
      --border-card-now:  #2d4a9a;
      --text:             #dde3f5;
      --text-sub:         #5a6a9a;
      --text-muted:       #4a5a8a;
      --text-dim:         #2a3a5a;
      --live-bg:          #0d1a0d;
      --live-border:      #1a3a1a;
      --live-color:       #4ade80;
      --rwy-a-bg:         #0d2a1a;
      --rwy-a-border:     #1a5a30;
      --rwy-a-color:      #4ade80;
      --rwy-i-bg:         #1a1208;
      --rwy-i-border:     #4a3a10;
      --rwy-i-color:      #fbbf24;
      --rwy-u-bg:         #0f1628;
      --rwy-u-border:     #1a2340;
      --rwy-u-color:      #6a7aaa;
      --badge-now-bg:     #0d2a1a;
      --badge-now-border: #1a5a30;
      --badge-now-color:  #4ade80;
      --badge-eta-bg:     #0d1a38;
      --badge-eta-border: #1a3060;
      --badge-eta-color:  #93c5fd;
      --card-now-bg:      linear-gradient(135deg,#0f1a38 0%,#0f1628 60%);
      --card-now-bar:     linear-gradient(90deg,#3b82f6,#818cf8);
      --arrow-color:      #3b82f6;
      --stat-value:       #dde3f5;
      --empty-bg:         #0a1020;
      --empty-border:     #1a2340;
      --empty-color:      #3a4a6a;
      --err-bg:           #1a0808;
      --err-border:       #5a1a1a;
      --err-color:        #fca5a5;
      --footer-color:     #2a3450;
      --meta-theme:       #080e1f;
    }
    [data-theme="light"] {
      --bg:               #f0f4ff;
      --bg-card:          #ffffff;
      --bg-inset:         #e4ecff;
      --bg-header:        #e0eaff;
      --border:           #c8d4f0;
      --border-card-now:  #93c5fd;
      --text:             #0a0f28;
      --text-sub:         #4a5a8a;
      --text-muted:       #6a7aaa;
      --text-dim:         #a0aec8;
      --live-bg:          #e8fef0;
      --live-border:      #86efac;
      --live-color:       #15803d;
      --rwy-a-bg:         #f0fdf4;
      --rwy-a-border:     #86efac;
      --rwy-a-color:      #15803d;
      --rwy-i-bg:         #fefce8;
      --rwy-i-border:     #fde68a;
      --rwy-i-color:      #b45309;
      --rwy-u-bg:         #f0f4ff;
      --rwy-u-border:     #c8d4f0;
      --rwy-u-color:      #6a7aaa;
      --badge-now-bg:     #dcfce7;
      --badge-now-border: #86efac;
      --badge-now-color:  #15803d;
      --badge-eta-bg:     #dbeafe;
      --badge-eta-border: #93c5fd;
      --badge-eta-color:  #1d4ed8;
      --card-now-bg:      linear-gradient(135deg,#eff6ff 0%,#ffffff 60%);
      --card-now-bar:     linear-gradient(90deg,#3b82f6,#818cf8);
      --arrow-color:      #3b82f6;
      --stat-value:       #0a0f28;
      --empty-bg:         #f0f4ff;
      --empty-border:     #c0cfee;
      --empty-color:      #8a9aba;
      --err-bg:           #fef2f2;
      --err-border:       #fca5a5;
      --err-color:        #b91c1c;
      --footer-color:     #8a9aba;
      --meta-theme:       #e0eaff;
    }

    /* ŌöĆŌöĆ Reset ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100dvh;
      padding: 0 0 40px;
      transition: background 0.25s, color 0.25s;
    }

    /* ŌöĆŌöĆ Header ŌöĆŌöĆ */
    header {
      background: linear-gradient(180deg, var(--bg-header) 0%, var(--bg) 100%);
      padding: 52px 20px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .header-left h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.6px; }
    .header-left .sub { font-size: 12px; color: var(--text-sub); margin-top: 3px; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--live-bg);
      border: 1px solid var(--live-border);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 11px; font-weight: 600;
      color: var(--live-color);
      letter-spacing: 0.5px;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--live-color);
    }
    .live-dot.active { animation: livepulse 1.8s ease-in-out infinite; }
    .live-dot.error  { background: #f87171; animation: none; }
    @keyframes livepulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.8); }
    }

    /* ŌöĆŌöĆ Theme toggle ŌöĆŌöĆ */
    .theme-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      transition: background 0.2s, border-color 0.2s;
      user-select: none;
    }
    .theme-btn:hover { border-color: var(--arrow-color); }

    /* ŌöĆŌöĆ Runway banner ŌöĆŌöĆ */
    .runway-banner {
      margin: 14px 16px 0;
      border-radius: 14px;
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; font-weight: 600;
    }
    .runway-banner.active  { background: var(--rwy-a-bg); border: 1px solid var(--rwy-a-border); color: var(--rwy-a-color); }
    .runway-banner.inactive{ background: var(--rwy-i-bg); border: 1px solid var(--rwy-i-border); color: var(--rwy-i-color); }
    .runway-banner.unknown { background: var(--rwy-u-bg); border: 1px solid var(--rwy-u-border); color: var(--rwy-u-color); }
    .runway-banner .rwy-left { display: flex; align-items: center; gap: 8px; }
    .runway-banner .rwy-wind { font-size: 11px; font-weight: 400; opacity: 0.75; }

    /* ŌöĆŌöĆ Sections ŌöĆŌöĆ */
    .section { padding: 20px 16px 0; }
    .section-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ŌöĆŌöĆ Cards ŌöĆŌöĆ */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: block; color: inherit; text-decoration: none;
    }
    .card:active { opacity: 0.85; }
    .card.now {
      border-color: var(--border-card-now);
      background: var(--card-now-bg);
    }
    .card.now::before {
      content: '';
      display: block; height: 3px;
      background: var(--card-now-bar);
      border-radius: 2px 2px 0 0;
      margin: -16px -16px 14px;
    }

    .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
    .card-top-info { flex: 1; min-width: 0; }

    /* Photo */
    .photo-thumb-wrap { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .photo-thumb { width: 90px; height: 65px; object-fit: cover; border-radius: 8px; display: block; background: var(--bg-inset); }
    .photo-credit { font-size: 8px; color: var(--text-dim); text-align: right; }

    .callsign { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .route-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; line-height: 1.3; }
    .airline-name { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .badge {
      border-radius: 20px; padding: 5px 12px;
      font-size: 13px; font-weight: 700;
      flex-shrink: 0; margin-top: 8px; display: inline-block;
    }
    .badge.visible-now { background: var(--badge-now-bg); color: var(--badge-now-color); border: 1px solid var(--badge-now-border); }
    .badge.eta         { background: var(--badge-eta-bg); color: var(--badge-eta-color); border: 1px solid var(--badge-eta-border); }

    /* Route strip */
    .route {
      display: flex; align-items: center;
      background: var(--bg-inset);
      border-radius: 12px; padding: 10px 14px;
      margin-bottom: 14px;
    }
    .apt { flex: 1; }
    .apt-code { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .apt-name { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .route-arrow { flex: 0; padding: 0 12px; font-size: 18px; color: var(--arrow-color); }
    .apt.dest .apt-code { text-align: right; }
    .apt.dest .apt-name { text-align: right; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat { background: var(--bg-inset); border-radius: 10px; padding: 8px 6px; text-align: center; }
    .stat-value { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--stat-value); }
    .stat-label { font-size: 9px; color: var(--text-muted); margin-top: 3px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .vrate-pos { color: #f87171; }
    .vrate-neg { color: #4ade80; }

    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .aircraft-type { font-size: 10px; color: var(--text-dim); }
    .open-fr24 { font-size: 10px; color: var(--arrow-color); }

    /* Rarity */
    .rarity { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; padding: 6px 12px; background: var(--bg-inset); border-radius: 8px; }
    .rarity-stars { font-size: 13px; letter-spacing: 1px; }
    .rarity-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; font-weight: 600; }
    .rarity-1 .rarity-stars { color: #6b7280; }
    .rarity-2 .rarity-stars { color: #22c55e; }
    .rarity-3 .rarity-stars { color: #3b82f6; }
    .rarity-4 .rarity-stars { color: #f59e0b; }
    .rarity-5 .rarity-stars { color: #ef4444; }

    /* Empty / Error */
    .empty {
      text-align: center; padding: 28px 16px;
      color: var(--empty-color);
      font-size: 14px;
      background: var(--empty-bg);
      border-radius: 18px;
      border: 1px dashed var(--empty-border);
    }
    .empty .icon { font-size: 28px; margin-bottom: 8px; }
    .error-msg {
      background: var(--err-bg); border: 1px solid var(--err-border);
      border-radius: 14px; padding: 16px;
      color: var(--err-color); font-size: 13px;
      text-align: center; margin-bottom: 10px;
    }

    /* Footer */
    .footer   { text-align: center; font-size: 10px; color: var(--footer-color); padding: 20px 16px 0; }
    .countdown{ font-size: 11px; color: var(--text-muted); text-align: center; padding: 10px; }

    /* ŌöĆŌöĆ Desktop ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    @media (min-width: 800px) {
      body { padding-bottom: 60px; }
      header {
        padding: 28px 48px;
        position: sticky; top: 0; z-index: 10;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      .header-left h1  { font-size: 30px; letter-spacing: -1px; }
      .header-left .sub{ font-size: 13px; margin-top: 4px; }

      .runway-banner { max-width: 1440px; margin: 20px auto 0; border-radius: 16px; }
      .section { max-width: 1440px; margin-left: auto; margin-right: auto; padding: 32px 48px 0; }
      .section-label { font-size: 11px; margin-bottom: 16px; }

      #visible-container, #upcoming-container {
        display: grid; grid-template-columns: repeat(2, 1fr);
        gap: 14px; align-items: start;
      }
      #visible-container .empty, #upcoming-container .empty,
      #visible-container .error-msg, #upcoming-container .error-msg { grid-column: 1 / -1; }

      .card { margin-bottom: 0; border-radius: 20px; padding: 20px; transition: background 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s; }
      .card:hover { background: var(--bg-inset); border-color: var(--border-card-now); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
      .card.now::before { margin: -20px -20px 16px; }

      .callsign    { font-size: 30px; }
      .route-title { font-size: 16px; }
      .airline-name{ font-size: 13px; margin-top: 5px; }
      .apt-code    { font-size: 22px; }
      .apt-name    { font-size: 11px; }
      .badge       { font-size: 13px; padding: 6px 14px; margin-top: 10px; }
      .photo-thumb { width: 110px; height: 78px; border-radius: 10px; }
      .stat-value  { font-size: 17px; }
      .rarity      { padding: 8px 14px; }
      .rarity-stars{ font-size: 15px; }
      .rarity-label{ font-size: 10px; }

      .countdown { max-width: 1440px; margin: 0 auto; font-size: 12px; padding: 14px 48px; text-align: left; }
      .footer    { max-width: 1440px; margin: 0 auto; font-size: 11px; padding: 16px 48px 0; text-align: left; }
    }
    @media (min-width: 1280px) {
      #visible-container, #upcoming-container { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Ō£ł Avions a la vista!</h1>
    <div class="sub">Seguiment d'aproximaci├│ final ┬Ę zona 800m</div>
  </div>
  <div class="header-right">
    <button class="theme-btn" id="theme-btn" title="Canviar tema" onclick="toggleTheme()">­¤īÖ</button>
    <div class="live-badge">
      <div class="live-dot active" id="live-dot"></div>
      EN VIU
    </div>
  </div>
</header>

<div id="runway-banner"></div>

<div class="section">
  <div class="section-label">­¤æü Visible des de la finestra</div>
  <div id="visible-container">
    <div class="empty"><div class="icon">­¤öŁ</div>Carregant...</div>
  </div>
</div>

<div class="section" style="margin-top:8px">
  <div class="section-label">­¤ĢÉ Pr├▓ximament</div>
  <div id="upcoming-container">
    <div class="empty"><div class="icon">­¤ōĪ</div>Carregant...</div>
  </div>
</div>

<div class="countdown" id="countdown"></div>
<div class="footer">Clica un vol per obrir-lo a FlightRadar24 ┬Ę Dades: adsb.lol</div>

<script>
// ŌöĆŌöĆ Apply saved theme before paint ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? 'ŌśĆ’ĖÅ' : '­¤īÖ';
})();

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? 'ŌśĆ’ĖÅ' : '­¤īÖ';
  const metaTheme = document.getElementById('meta-theme');
  if (metaTheme) metaTheme.content = next === 'dark' ? '#080e1f' : '#e0eaff';
}

// ŌöĆŌöĆ FR24 link (strip Referer to avoid HTTP 451) ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function openFR24(url) {
  const a = document.createElement('a');
  a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
  a.style.display = 'none';
  document.body.appendChild(a); a.click();
  setTimeout(() => document.body.removeChild(a), 100);
}

// ŌöĆŌöĆ Config ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const ZONE         = { lat: 41.32274268047485, lon: 2.1520313218071245 };
const ZONE_RADIUS_M = 800;
const BCN          = { lat: 41.2974, lon: 2.0833 };
const MAX_ALT_FT   = 11500;
const MAX_ETA_S    = 300;       // 5 min
const REFRESH_MS   = 8000;
const FR24_BASE    = 'https://www.flightradar24.com/';

// ŌöĆŌöĆ Airline lookup ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const AIRLINES = {
  // Spanish & Iberian
  VLG:'Vueling', IBE:'Iberia', IBX:'Iberia Express', AEA:'Air Europa',
  TAP:'TAP Air Portugal', VOE:'Volotea', LVL:'LEVEL',
  // Low-cost Europe
  RYR:'Ryanair', RUK:'Ryanair UK', EZY:'easyJet',
  EZT:'easyJet Europe', EZS:'easyJet Switzerland',
  WZZ:'Wizz Air', WMT:'Wizz Air Malta', WUK:'Wizz Air UK',

// ŌöĆŌöĆ Utilities ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function haversineM(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2
          + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function fmtEta(sec) {
  if (sec <= 0) return '0s';
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

// ŌöĆŌöĆ Rarity ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const RARITY_LABELS = ['', 'Molt com├║', 'Com├║', 'Ocasional', 'Rar', 'Molt rar'];

function calcRarity(route, f) {
  let distKm = 0;
  if (route?.originLat != null && route?.originLon != null)
    distKm = haversineM(route.originLat, route.originLon, BCN.lat, BCN.lon) / 1000;

  let stars;
  if      (distKm === 0)   stars = 2;
  else if (distKm < 300)   stars = 1;   // Spain, Balearics
  else if (distKm < 1000)  stars = 2;   // W Europe (Paris, RomeŌĆ”)
  else if (distKm < 2500)  stars = 3;   // London, Berlin, Istanbul NBŌĆ”
  else if (distKm < 5500)  stars = 4;   // Middle East, transatlantic
  else                     stars = 5;   // Asia, Americas

  const type = (f.acType || '').toUpperCase();
  const isVeryLarge = /^(A38|B74)/.test(type);
  const isWidebody  = !isVeryLarge && /^(A3[3-5]|B7[678]|A300|A310|DC10|MD1[01])/.test(type);
  if      (isVeryLarge) stars = Math.min(5, stars + 2);
  else if (isWidebody)  stars = Math.min(5, stars + 1);
  return Math.max(1, Math.min(5, stars));
}

function renderRarity(stars) {
  const filled = 'Ōśģ'.repeat(stars);
  const empty  = 'Ōśå'.repeat(5 - stars);
  return `<div class="rarity rarity-${stars}">
    <span class="rarity-stars">${filled}${empty}</span>
    <span class="rarity-label">${RARITY_LABELS[stars]}</span>
  </div>`;
}

// ŌöĆŌöĆ Operator cache & airline lookup ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const operatorNameCache = new Map();

function getAirline(callsign, icao24) {
  const prefix = (callsign || '').substring(0, 3).toUpperCase();
  if (AIRLINES[prefix]) return AIRLINES[prefix];
  if (icao24 && operatorNameCache.has(icao24.toLowerCase()))
    return operatorNameCache.get(icao24.toLowerCase());
  return prefix || '';
}

// ŌöĆŌöĆ API fetches ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
async function fetchStates() {
  const res = await fetch('/api/aircraft');
  if (!res.ok) throw new Error(`Error API ${res.status}`);
  const data = await res.json();
  return (data.ac || []).map(ac => ({
    icao24:   ac.hex || '',
    callsign: (ac.flight || ac.callsign || '').trim(),
    lat:      ac.lat,
    lon:      ac.lon,
    baroAlt:  typeof ac.alt_baro === 'number' ? ac.alt_baro : null,
    onGround: ac.alt_baro === 'ground' || (typeof ac.gs === 'number' && ac.gs < 30),
    velocity: ac.gs,
    heading:  ac.track,
    vertRate: ac.baro_rate,
    acType:   ac.t  || '',
    acDesc:   ac.desc || '',
    reg:      ac.r  || '',
  }));
}

async function fetchPhoto(icao24) {
  try {
    const res = await fetch(`/api/photo/${encodeURIComponent(icao24)}`);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function fetchFlight(icao24, callsign) {
  // 1. OpenSky hex-based
  try {
    const res = await fetch(`/api/flight/${encodeURIComponent(icao24)}`);
    if (res.ok) { const d = await res.json(); if (d?.origin) return d; }
  } catch {}
  // 2. Route by callsign
  try {
    const res = await fetch(`/api/route/${encodeURIComponent(callsign)}`);
    if (res.ok) { const d = await res.json(); if (d?.origin) return d; }
  } catch {}
  // 3. Operator name for unknown prefixes
  const prefix = (callsign || '').substring(0, 3).toUpperCase();
  if (!AIRLINES[prefix] && icao24) {
    try {
      const res = await fetch(`/api/operator/${encodeURIComponent(icao24)}`);
      if (res.ok) {
        const d = await res.json();
        if (d?.operator) operatorNameCache.set(icao24.toLowerCase(), d.operator);
      }
    } catch {}
  }
  return null;
}

// ŌöĆŌöĆ Card builder ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function buildCard(f, route, photo) {
  const fr24url  = `${FR24_BASE}${f.callsign}`;
  const isNow    = f.distM <= ZONE_RADIUS_M;
  const badgeText  = isNow ? '­¤æü ARA' : `en ${fmtEta(f.eta)}`;
  const badgeClass = isNow ? 'badge visible-now' : 'badge eta';

  const altFt = f.baroAlt != null ? `${Math.round(f.baroAlt / 100) * 100}ft` : 'ŌĆö';
  const speed  = f.velocity != null ? `${Math.round(f.velocity)}kt` : 'ŌĆö';
  const vr     = f.vertRate;
  const vrVal  = vr != null ? Math.round(vr) : null;
  const vrStr  = vrVal != null ? (vrVal > 0 ? `+${vrVal}` : `${vrVal}`) : 'ŌĆö';
  const vrClass= vr > 100 ? 'vrate-pos' : vr < -100 ? 'vrate-neg' : '';

  const airline  = getAirline(f.callsign, f.icao24);
  const typeDesc = f.acDesc ? ` ┬Ę ${f.acDesc}` : (f.acType ? ` ┬Ę ${f.acType}` : '');
  const subline  = airline ? `${airline}${typeDesc}` : (f.acType || '');

  const routeHtml = route?.origin
    ? `<div class="route">
        <div class="apt">
          <div class="apt-code">${route.origin}</div>
          <div class="apt-name">${route.originName || ''}</div>
        </div>
        <div class="route-arrow">ŌåÆ</div>
        <div class="apt dest">
          <div class="apt-code">BCN</div>
          <div class="apt-name">Barcelona</div>
        </div>
      </div>`
    : `<div class="callsign">${f.callsign}</div>`;

  const photoHtml = photo?.url
    ? `<div class="photo-thumb-wrap">
        <img class="photo-thumb" src="${photo.url}" alt="${f.acType}" loading="lazy">
        ${photo.photographer ? `<div class="photo-credit">┬® ${photo.photographer}</div>` : ''}
      </div>`
    : '';

  const rarityHtml = renderRarity(calcRarity(route, f));
  const footerType = [f.acType, f.reg].filter(Boolean).join(' ┬Ę ');

  return `<div class="card${isNow ? ' now' : ''}" onclick="openFR24('${fr24url}')">
    <div class="card-top">
      <div class="card-top-info">
        ${routeHtml}
        <div class="airline-name">${subline}</div>
        <span class="${badgeClass}">${badgeText}</span>
      </div>
      ${photoHtml}
    </div>
    ${rarityHtml}
    <div class="stats">
      <div class="stat"><div class="stat-value">${altFt}</div><div class="stat-label">Altitude</div></div>
      <div class="stat"><div class="stat-value">${speed}</div><div class="stat-label">Speed</div></div>
      <div class="stat"><div class="stat-value ${vrClass}">${vrStr} fpm</div><div class="stat-label">V/S</div></div>
    </div>
    ${footerType ? `<div class="card-footer"><span class="aircraft-type">${footerType}</span><span class="open-fr24">ŌåŚ FR24</span></div>` : ''}
  </div>`;
}

// ŌöĆŌöĆ Runway banner ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function renderRunwayBanner(info) {
  const el = document.getElementById('runway-banner');
  if (!info) { el.innerHTML = ''; return; }
  const rwy = info.runway;
  const isActive = rwy === '25' || rwy === '07';
  const cls  = isActive ? 'active' : (rwy === 'unknown' ? 'unknown' : 'inactive');
  const icon = rwy === '25' ? '­¤ø¼' : rwy === '07' ? '­¤ø¼' : 'ŌØō';
  const windStr = info.wind
    ? `${info.wind.dir}┬░/${info.wind.speed}kt${info.wind.gust ? ` raf ${info.wind.gust}kt` : ''}`
    : '';
  el.innerHTML = `<div class="runway-banner ${cls}">
    <div class="rwy-left">${icon} <strong>Pista ${rwy}</strong> <span class="rwy-wind">${windStr}</span></div>
  </div>`;
}

// ŌöĆŌöĆ Main refresh loop ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
let fetchedAt = 0;

async function refresh() {
  const dot = document.getElementById('live-dot');
  try {
    const [runwayInfo, states] = await Promise.all([
      fetch('/api/runway').then(r => r.json()).catch(() => null),
      fetchStates(),
    ]);

    renderRunwayBanner(runwayInfo);

    // Filter: not on ground, low altitude, within query range
    const QUERY_M = 25 * 1852; // 25 NM in metres
    const candidates = states.filter(f => {
      if (!f.callsign) return false;
      if (f.onGround)  return false;
      if (f.baroAlt == null || f.baroAlt > MAX_ALT_FT) return false;
      if (f.lat == null || f.lon == null) return false;
      const d = haversineM(f.lat, f.lon, ZONE.lat, ZONE.lon);
      return d <= QUERY_M;
    });

    // Compute ETA to zone for each
    const withEta = candidates.map(f => {
      const distM     = haversineM(f.lat, f.lon, ZONE.lat, ZONE.lon);
      const gsMs      = (f.velocity || 120) * 0.514444;
      const remaining = Math.max(0, distM - ZONE_RADIUS_M);
      const eta       = remaining / gsMs;
      return { ...f, distM, eta };
    });

    // Keep only descending (or in zone) within 5-min window
    const approaching = withEta.filter(f =>
      f.distM <= ZONE_RADIUS_M ||
      (f.eta <= MAX_ETA_S && (f.vertRate == null || f.vertRate < 300))
    ).sort((a, b) => a.eta - b.eta);

    // Fetch route + photo in parallel
    const routeMap = new Map();
    const photoMap = new Map();
    await Promise.allSettled(approaching.map(async f => {
      const [route, photo] = await Promise.all([
        fetchFlight(f.icao24, f.callsign),
        fetchPhoto(f.icao24),
      ]);
      routeMap.set(f.icao24, route);
      photoMap.set(f.icao24, photo);
    }));

    const visible  = approaching.filter(f => f.distM <= ZONE_RADIUS_M);
    const upcoming = approaching.filter(f => f.distM > ZONE_RADIUS_M);

    const render = (list) => list.length === 0
      ? '<div class="empty"><div class="icon">Ō£ł’ĖÅ</div>Cap vol en aquest moment</div>'
      : list.map(f => buildCard(f, routeMap.get(f.icao24), photoMap.get(f.icao24))).join('');

    document.getElementById('visible-container').innerHTML  = render(visible);
    document.getElementById('upcoming-container').innerHTML = render(upcoming);

    dot.className = 'live-dot active';
    fetchedAt = Date.now();
  } catch(e) {
    dot.className = 'live-dot error';
    document.getElementById('visible-container').innerHTML =
      `<div class="error-msg">ŌÜĀ’ĖÅ Error: ${e.message}</div>`;
  }
  updateCountdown();
}

function updateCountdown() {
  const el = document.getElementById('countdown');
  const rem = Math.max(0, Math.ceil((fetchedAt + REFRESH_MS - Date.now()) / 1000));
  el.textContent = rem > 0 ? `Actualitzaci├│ en ${rem}s` : '';
}
setInterval(updateCountdown, 1000);

refresh();
setInterval(refresh, REFRESH_MS);
